services:
  mcp-server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: mcp-server
    ports:
      - "${MCP_PORT:-8080}:8080"
    volumes:
      - mcp-data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/academic_advisor.db
      - CHROMA_PERSISTENT=true
      - CHROMA_PERSIST_DIR=./data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  mcp-data:
